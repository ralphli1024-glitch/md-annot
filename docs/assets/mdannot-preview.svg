  <rect x="705" y="174" width="3" height="8" rx="1" fill="#28a745"/>
  
  <text x="542" y="198" fill="#1e1c19" font-size="11" font-family="-apple-system,BlinkMacSystemFont,sans-serif">高内聚低耦合</text>
