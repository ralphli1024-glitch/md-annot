  <rect x="700" y="232" width="3" height="8" rx="1" fill="#FF9800"/>
  <rect x="705" y="232" width="3" height="8" rx="1" fill="#F44336"/>
  
  <text x="542" y="256" fill="#1e1c19" font-size="11" font-family="-apple-system,BlinkMacSystemFont,sans-serif">持续演进</text>
  <rect x="542" y="260" width="24" height="12" rx="3" fill="rgba(255,193,7,0.12)"/>
  <text x="548" y="269" fill="#856404" font-size="8" font-family="-apple-system,BlinkMacSystemFont,sans-serif">模糊</text>
  
  <!-- Item 3: Comment -->
  <rect x="531" y="278" width="237" height="66" rx="5" fill="#fafaf8" stroke="#e8e6e1" stroke-width="1"/>
  <rect x="531" y="278" width="3" height="66" rx="0" fill="#28a745"/>
  <text x="542" y="296" fill="#8a8680" font-size="10" font-family="-apple-system,BlinkMacSystemFont,sans-serif">💬 评论</text>
  <!-- Status bar - all green -->
  <rect x="660" y="290" width="3" height="8" rx="1" fill="#28a745"/>
  <rect x="665" y="290" width="3" height="8" rx="1" fill="#28a745"/>
  <rect x="670" y="290" width="3" height="8" rx="1" fill="#28a745"/>
  <rect x="675" y="290" width="3" height="8" rx="1" fill="#28a745"/>
  <rect x="680" y="290" width="3" height="8" rx="1" fill="#28a745"/>
  <rect x="685" y="290" width="3" height="8" rx="1" fill="#28a745"/>
  <rect x="690" y="290" width="3" height="8" rx="1" fill="#28a745"/>
  <rect x="695" y="290" width="3" height="8" rx="1" fill="#28a745"/>
  <rect x="700" y="290" width="3" height="8" rx="1" fill="#28a745"/>
  <rect x="705" y="290" width="3" height="8" rx="1" fill="#28a745"/>
  
  <text x="542" y="314" fill="#1e1c19" font-size="11" font-family="-apple-system,BlinkMacSystemFont,sans-serif">接口契约的定义方式</text>
  <text x="542" y="330" fill="#8a8680" font-size="10" font-family="-apple-system,BlinkMacSystemFont,sans-serif">💬 通过接口而非实现编程</text>
  <rect x="542" y="336" width="24" height="12" rx="3" fill="rgba(40,167,69,0.12)"/>
  <text x="548" y="345" fill="#28a745" font-size="8" font-family="-apple-system,BlinkMacSystemFont,sans-serif">精确</text>
  
  <!-- Export button -->
  <rect x="531" y="360" width="237" height="30" rx="5" fill="#1e1c19"/>
  <text x="649" y="380" fill="#fafaf8" font-size="11" font-weight="500" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,sans-serif">📥 导出批注</text>
  
  <!-- Feature badges -->
  <rect x="20" y="470" width="160" height="24" rx="12" fill="rgba(76,184,153,0.12)"/>
  <circle cx="36" cy="482" r="4" fill="#4cb899"/>
