  <rect x="148" y="148" width="28" height="18" rx="5" fill="rgba(76,184,153,0.12)"/>
  <text x="162" y="162" fill="#4cb899" font-size="13" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,sans-serif">🖌</text>
  <text x="186" y="162" fill="#8a8680" font-size="13" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,sans-serif">〰️</text>
  <text x="212" y="162" fill="#8a8680" font-size="13" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,sans-serif">💬</text>
  
