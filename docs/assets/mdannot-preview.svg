  <rect x="660" y="174" width="3" height="8" rx="1" fill="#28a745"/>
  <rect x="665" y="174" width="3" height="8" rx="1" fill="#28a745"/>
  <rect x="670" y="174" width="3" height="8" rx="1" fill="#28a745"/>
  <rect x="675" y="174" width="3" height="8" rx="1" fill="#28a745"/>
  <rect x="680" y="174" width="3" height="8" rx="1" fill="#28a745"/>
  <rect x="685" y="174" width="3" height="8" rx="1" fill="#28a745"/>
