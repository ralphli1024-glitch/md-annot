<svg xmlns="http://www.w3.org/2000/svg" width="800" height="480" viewBox="0 0 800 480">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f4f2ef"/>
      <stop offset="100%" stop-color="#fafaf8"/>
    </linearGradient>
    <linearGradient id="header" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a2824"/>
      <stop offset="100%" stop-color="#1e1c19"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-opacity="0.12"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="480" fill="url(#bg)" rx="16"/>
  
  <!-- Title area -->
  <rect x="20" y="20" width="28" height="28" rx="8" fill="#1e1c19"/>
  <text x="34" y="39" fill="#fafaf8" font-size="14" font-weight="700" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,sans-serif">M</text>
  <text x="58" y="40" fill="#1e1c19" font-size="18" font-weight="700" font-family="-apple-system,BlinkMacSystemFont,sans-serif">MDAnnot</text>
  
  <text x="68" y="72" fill="#5a5650" font-size="13" font-family="-apple-system,BlinkMacSystemFont,sans-serif">在 Markdown 上留下你的阅读痕迹</text>
  
  <!-- Editor mockup -->
  <rect x="20" y="90" width="480" height="370" rx="10" fill="#fff" stroke="#e8e6e1" stroke-width="1" filter="url(#shadow)"/>
  
  <!-- Editor header -->
  <rect x="20" y="90" width="480" height="36" rx="10" fill="#fafaf8" stroke="#e8e6e1" stroke-width="1"/>
  <rect x="20" y="116" width="480" height="10" fill="#fafaf8"/>
  <circle cx="44" cy="108" r="5" fill="#e07a7a"/>
  <circle cx="60" cy="108" r="5" fill="#f29e6d"/>
  <circle cx="76" cy="108" r="5" fill="#4cb899"/>
  <text x="92" y="112" fill="#8a8680" font-size="11" font-family="-apple-system,BlinkMacSystemFont,sans-serif">阅读笔记.md — Obsidian</text>
  
  <!-- Document content -->
  <text x="36" y="150" fill="#5a5650" font-size="13" font-weight="600" font-family="-apple-system,BlinkMacSystemFont,sans-serif"># 阅读笔记</text>
  
  <text x="36" y="180" fill="#1e1c19" font-size="13" font-family="-apple-system,BlinkMacSystemFont,sans-serif">核心概念是</text>
  <rect x="120" y="166" width="108" height="18" rx="2" fill="#90EE90" opacity="0.7"/>
  <text x="123" y="180" fill="#1e1c19" font-size="13" font-family="-apple-system,BlinkMacSystemFont,sans-serif">语义化版本控制</text>
  <text x="228" y="180" fill="#1e1c19" font-size="13" font-family="-apple-system,BlinkMacSystemFont,sans-serif">，即</text>
  
  <text x="36" y="205" fill="#1e1c19" font-size="13" font-family="-apple-system,BlinkMacSystemFont,sans-serif">通过版本号</text>
  <text x="120" y="205" fill="#1e1c19" font-size="13" text-decoration="underline wavy #4169E1" font-family="-apple-system,BlinkMacSystemFont,sans-serif">传递</text>
  <text x="156" y="205" fill="#1e1c19" font-size="13" font-family="-apple-system,BlinkMacSystemFont,sans-serif">兼容性信息。</text>
  
  <text x="36" y="230" fill="#1e1c19" font-size="13" font-family="-apple-system,BlinkMacSystemFont,sans-serif">主版本号变更表示</text>
  <rect x="164" y="216" width="100" height="18" rx="2" fill="#90EE90" opacity="0.7"/>
  <text x="167" y="230" fill="#1e1c19" font-size="13" font-family="-apple-system,BlinkMacSystemFont,sans-serif">不兼容的 API</text>
  <text x="264" y="230" fill="#1e1c19" font-size="13" font-family="-apple-system,BlinkMacSystemFont,sans-serif">修改。</text>
  
  <text x="36" y="260" fill="#1e1c19" font-size="13" font-family="-apple-system,BlinkMacSystemFont,sans-serif">模块间通过</text>
  <rect x="120" y="246" width="64" height="18" rx="2" fill="#FFFFAA" opacity="0.7"/>
  <text x="123" y="260" fill="#1e1c19" font-size="13" font-family="-apple-system,BlinkMacSystemFont,sans-serif">接口契约</text>
  <text x="184" y="260" fill="#1e1c19" font-size="13" font-family="-apple-system,BlinkMacSystemFont,sans-serif">通信。</text>
  
  <!-- Separator -->
