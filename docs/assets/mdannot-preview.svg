  <text x="106" y="301" fill="#5a5650" font-size="11" font-family="-apple-system,BlinkMacSystemFont,sans-serif">划线</text>
  <rect x="152" y="292" width="10" height="10" rx="2" fill="#FFFFAA"/>
  <text x="168" y="301" fill="#5a5650" font-size="11" font-family="-apple-system,BlinkMacSystemFont,sans-serif">评论</text>
  
