  <rect x="660" y="232" width="3" height="8" rx="1" fill="#28a745"/>
  <rect x="665" y="232" width="3" height="8" rx="1" fill="#28a745"/>
  <rect x="670" y="232" width="3" height="8" rx="1" fill="#28a745"/>
  <rect x="675" y="232" width="3" height="8" rx="1" fill="#28a745"/>
